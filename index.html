```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Come Absent With Me?</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffd1dc);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
}

h1{
    color:#fff;
    font-size:3rem;
    margin-bottom:40px;
    text-shadow:2px 2px 5px rgba(0,0,0,.2);
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    transition:.2s;
}

#yes{
    background:#28a745;
    color:white;
    margin-right:20px;
}

#no{
    background:#dc3545;
    color:white;
    position:absolute;
}

#message{
    margin-top:40px;
    font-size:2rem;
    color:white;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>Come absent with me? 🥺</h1>

    <button id="yes">Yes ❤️</button>
    <button id="no">No 💔</button>

    <div id="message"></div>
</div>

<script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const message = document.getElementById("message");

noBtn.style.left = "60%";
noBtn.style.top = "55%";

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

yesBtn.addEventListener("click", () => {
    message.innerHTML = "YAY!! 🎉 See you tomorrow! ❤️";
    yesBtn.style.display = "none";
    noBtn.style.display = "none";
});
</script>

</body>
</html>
```
